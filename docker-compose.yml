services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/config.yml:/app/config.yml:ro
      - backend_logs:/var/log/watchdog
    restart: unless-stopped
    expose:
      - "8042"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8042/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "4173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4173 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "80:80"

volumes:
  backend_logs:
